<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI React App Generator V2</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://js.puter.com/v2/"></script>
</head>
<body>

  <div class="container">
    <h1>⚡ AI React App Generator</h1>
    <p class="subtitle">Describe → Generate → Copy → Preview</p>

    <textarea id="prompt" placeholder="Describe your app..."></textarea>

    <div class="buttons">
      <button onclick="generate()">✨ Generate</button>
      <button onclick="copyCode()">📋 Copy</button>
      <button onclick="previewCode()">👁 Preview</button>
    </div>

    <div id="status"></div>

    <pre id="output"></pre>

    <iframe id="preview"></iframe>
  </div>

  <script src="app.js"></script>
</body>
</html>
